<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro Exitoso - MasAgua</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F0F8FF;
      color: #16324A;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/saas.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script defer>document.addEventListener('DOMContentLoaded', function () { if (window.lucide) window.lucide.createIcons(); });</script>
</head>
<body>
  <header class="bg-[#16324A] text-white shadow-md">
    <div class="container mx-auto p-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">MasAgua</h1>
      <nav>
        <a href="index.html" class="hover:text-[#B8DCFF] uppercase font-semibold text-sm">Inicio</a>
      </nav>
    </div>
  </header>

  <main class="flex flex-col justify-center items-center min-h-[70vh] px-4 text-center">
    <h2 class="text-3xl font-bold text-[#16324A] mb-4"><i data-lucide="circle-check"></i> Registro exitoso</h2>
    <p class="text-lg mb-6">Gracias por registrarte. En breve te contactaremos para confirmar tu cuenta.</p>
    <a href="index.html" class="px-4 py-2 bg-[#B8DCFF] text-[#16324A] rounded font-semibold hover:bg-[#4A9ECC] transition">
      Volver al inicio
    </a>
  </main>
</body>
</html>
